<section class="relationship-counter" aria-label="Contador desde o primeiro encontro">
  <span class="relationship-counter__label">Desde o primeiro encontro</span>
  <strong class="relationship-counter__time">
    {{ counter().years }} ano, {{ counter().months }} meses, {{ counter().days }} dias
  </strong>
  <p class="relationship-counter__detail">
    {{ counter().totalDays }} dias, {{ counter().totalHours }} horas e contando
  </p>
</section>
