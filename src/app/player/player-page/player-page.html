<main class="player-page" aria-label="Player do casal">
  <section class="player-page__shell">
    <header class="player-page__header">
      <button class="player-page__icon" type="button" aria-label="Cartas">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="M4 4h16v16H4V4Z"></path>
          <path d="m22 6-10 7L2 6"></path>
        </svg>
      </button>

      <div class="player-page__header-copy">
        <span>Tocando da playlist</span>
        <strong>Nossa história</strong>
      </div>

      <div class="player-page__menu">
        <button
          class="player-page__icon"
          type="button"
          aria-label="Mais opções"
          [attr.aria-expanded]="isMenuOpen()"
          (click)="toggleMenu()"
        >
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <circle cx="12" cy="12" r="1"></circle>
            <circle cx="12" cy="5" r="1"></circle>
            <circle cx="12" cy="19" r="1"></circle>
          </svg>
        </button>

        @if (isMenuOpen()) {
          <div class="player-page__menu-list" aria-label="Opções do player">
            <button class="player-page__menu-item" type="button" disabled>Em breve</button>
            <a class="player-page__menu-item" routerLink="/">Sair</a>
          </div>
        }
      </div>
    </header>

    <app-photo-carousel />

    <section class="player-page__song" aria-label="Música atual">
      <div class="player-page__song-copy">
        <p class="player-page__song-line">
          Pode passar mil anos você vai me amar<br>
          E eu vou ser pra sempre seu
        </p>

        <h1 class="player-page__song-title">Mil Anos</h1>
        <p class="player-page__song-artist">Jorge &amp; Mateus</p>
      </div>

      <span class="player-page__saved" aria-label="Salvo">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="m20 6-11 11-5-5"></path>
        </svg>
      </span>
    </section>

    <app-relationship-counter />
    <app-music-controls />
    <app-lyrics-panel />
  </section>
</main>
